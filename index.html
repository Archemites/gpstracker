<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador de Carros GPS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .config-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .config-form {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .config-form input {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .config-form input:focus {
            outline: none;
            border-color: #667eea;
        }

        .config-form button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 1em;
        }

        .config-form button:hover {
            background: #764ba2;
        }

        .status {
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
        }

        .status.online {
            background: #4caf50;
            color: white;
        }

        .status.offline {
            background: #f44336;
            color: white;
        }

        .conteudo {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
        }

        .mapa-container {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        canvas {
            display: block;
            width: 100%;
            height: 500px;
        }

        .painel {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .painel-header {
            background: #667eea;
            color: white;
            padding: 15px;
            font-weight: bold;
            border-bottom: 1px solid #e0e0e0;
        }

        .painel-content {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .carro-item {
            padding: 12px;
            margin-bottom: 8px;
            border-left: 4px solid #667eea;
            background: #f9f9f9;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .carro-item:hover {
            background: #f0f0f0;
        }

        .carro-item.selecionado {
            background: #e8eaf6;
            border-left-color: #764ba2;
        }

        .placa {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 5px;
            font-family: 'Courier New', monospace;
        }

        .info {
            font-size: 0.85em;
            color: #666;
            line-height: 1.5;
        }

        .velocidade {
            color: #667eea;
            font-weight: bold;
        }

        .distancia {
            color: #4caf50;
            font-weight: bold;
        }

        .grid-responsivo {
            display: grid;
            grid-template-columns: 1fr;
        }

        @media (min-width: 1024px) {
            .grid-responsivo {
                grid-template-columns: 1fr 300px;
            }
        }

        .erro {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border-left: 4px solid #c62828;
        }

        .carregando {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Rastreador GPS</h1>
            <p>Acompanhe a frota em tempo real</p>
        </div>

        <div class="config-box">
            <div class="config-form">
                <input type="text" id="urlNgrok" placeholder="Cole a URL do NGROK aqui (ex: https://abc123.ngrok.io)" value="">
                <button onclick="conectar()">Conectar</button>
                <div class="status offline" id="statusConexao">Desconectado</div>
            </div>
        </div>

        <div id="erro"></div>

        <div class="conteudo">
            <div class="mapa-container">
                <canvas id="mapa"></canvas>
            </div>

            <div class="painel">
                <div class="painel-header">Frota (0)</div>
                <div class="painel-content" id="listaCarros">
                    <div class="carregando">
                        Cole a URL do NGROK acima para começar
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("mapa");
        const ctx = canvas.getContext("2d");

        let urlBase = "";
        let config = {};
        let carros = {};
        let selecionado = null;
        let conectado = false;

        function redimensionarCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = 500;
        }

        window.addEventListener("resize", redimensionarCanvas);
        redimensionarCanvas();

        function salvarURL() {
            const url = document.getElementById("urlNgrok").value.trim();
            if (url) {
                localStorage.setItem("urlNgrok", url);
            }
        }

        function carregarURL() {
            const url = localStorage.getItem("urlNgrok");
            if (url) {
                document.getElementById("urlNgrok").value = url;
            }
        }

        async function conectar() {
            const url = document.getElementById("urlNgrok").value.trim();
            if (!url) {
                mostrarErro("Informe a URL do NGROK");
                return;
            }

            try {
                urlBase = url;
                salvarURL();

                // Testa conexão
                const res = await fetch(`${urlBase}/api/config`, {
                    method: "GET",
                    headers: { "Content-Type": "application/json" }
                });

                if (!res.ok) {
                    throw new Error("Falha ao conectar");
                }

                config = await res.json();
                conectado = true;

                document.getElementById("statusConexao").textContent = "✓ Conectado";
                document.getElementById("statusConexao").className = "status online";
                document.getElementById("erro").innerHTML = "";

                loop();
            } catch (e) {
                conectado = false;
                mostrarErro(`❌ Erro ao conectar: ${e.message}`);
                document.getElementById("statusConexao").textContent = "✗ Desconectado";
                document.getElementById("statusConexao").className = "status offline";
            }
        }

        function mostrarErro(msg) {
            document.getElementById("erro").innerHTML = `<div class="erro">${msg}</div>`;
        }

        function geoPxtoParaPx(lat, lon) {
            const x = (lon - config.lon_min) / (config.lon_max - config.lon_min) * canvas.width;
            const y = (config.lat_max - lat) / (config.lat_max - config.lat_min) * canvas.height;
            return [x, y];
        }

        async function atualizar() {
            if (!conectado) return;

            try {
                const res = await fetch(`${urlBase}/api/carros`);
                if (!res.ok) throw new Error("Erro ao buscar carros");
                carros = await res.json();
                atualizarLista();
            } catch (e) {
                console.error(e);
            }
        }

        function atualizarLista() {
            const lista = document.getElementById("listaCarros");
            const count = Object.keys(carros).length;

            document.querySelector(".painel-header").textContent = `Frota (${count})`;

            if (count === 0) {
                lista.innerHTML = '<div class="carregando">Nenhum carro na frota</div>';
                return;
            }

            lista.innerHTML = Object.values(carros).map(c => `
                <div class="carro-item ${selecionado === c.placa ? 'selecionado' : ''}" onclick="selecionarCarro('${c.placa}')">
                    <div class="placa">${c.placa}</div>
                    <div class="info">
                        <div class="velocidade">⚡ ${c.velocidade.toFixed(0)} km/h</div>
                        <div class="distancia">📍 ${c.distancia.toFixed(1)} km</div>
                        <div>👤 ${c.motorista}</div>
                        <div style="font-size: 0.8em; margin-top: 5px;">
                            ${c.lat.toFixed(5)}°<br>
                            ${c.lon.toFixed(5)}°
                        </div>
                    </div>
                </div>
            `).join("");
        }

        function selecionarCarro(placa) {
            selecionado = selecionado === placa ? null : placa;
            atualizarLista();
        }

        function desenharMapa() {
            // Fundo
            ctx.fillStyle = "#0f2027";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grade
            ctx.strokeStyle = "#1b3a4b";
            ctx.lineWidth = 1;
            const linhas = 6;

            for (let i = 0; i <= linhas; i++) {
                const x = i / linhas * canvas.width;
                const y = i / linhas * canvas.height;

                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            // Carros
            for (const placa in carros) {
                const c = carros[placa];
                const [x, y] = geoPxtoParaPx(c.lat, c.lon);

                const r = selecionado === placa ? 10 : 7;
                const contorno = selecionado === placa ? "#ffff00" : "#000";
                const larg = selecionado === placa ? 3 : 1;

                // Círculo
                ctx.fillStyle = c.cor;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = contorno;
                ctx.lineWidth = larg;
                ctx.stroke();

                // Seta
                const ax = x + Math.cos(c.rumo) * (r + 8);
                const ay = y - Math.sin(c.rumo) * (r + 8);
                ctx.strokeStyle = contorno;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(ax, ay);
                ctx.stroke();

                // Placa
                ctx.fillStyle = "white";
                ctx.font = "bold 10px Consolas";
                ctx.textAlign = "center";
                ctx.fillText(placa, x, y - r - 8);
            }
        }

        async function loop() {
            await atualizar();
            desenharMapa();
            if (conectado) {
                setTimeout(loop, 500);
            }
        }

        carregarURL();
    </script>
</body>
</html>
